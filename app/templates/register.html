<!doctype html>
<html><head><title>Register</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="auth">
  <form method="post" class="card">
    <h2>Create Account</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="you@pes.edu" required>
    <input type="password" name="password" placeholder="Password" required>
    <input name="branch" placeholder="Branch (CSE/ECE/etc)">
    <textarea name="bio" placeholder="Bio"></textarea>
    <input name="interests" placeholder="Interests (comma separated)">
    <button type="submit">Register</button>
    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </form>
</body></html>
