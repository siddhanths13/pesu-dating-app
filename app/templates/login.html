<!doctype html>
<html><head><title>Login</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body class="auth">
  <form method="post" class="card">
    <h2>Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <input type="email" name="email" placeholder="you@pes.edu" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <p>New here? <a href="{{ url_for('register') }}">Register</a></p>
  </form>
</body></html>
