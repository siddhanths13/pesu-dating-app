{% extends 'base.html' %}
{% block content %}
<h2>Your Profile</h2>
<form method="post" class="card">
  <input name="name" value="{{ user.name }}" required>
  <input name="branch" value="{{ user.branch or '' }}" placeholder="Branch">
  <textarea name="bio" placeholder="Bio">{{ user.bio or '' }}</textarea>
  <input name="interests" value="{{ user.interests or '' }}" placeholder="Interests">
  <button type="submit">Save</button>
</form>
{% endblock %}
